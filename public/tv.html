<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partystation - TV</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 4em; justify-content: flex-start; }
        #timer-display {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 4em;
            font-weight: 900;
            color: var(--accent-1);
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 20px;
            display: none;
        }
        .big-prompt { font-size: 4em; margin-bottom: 1em; }
        .tv-card { width: 100%; max-width: 1000px; }
    </style>
</head>
<body class="tv-mode">
    <div id="timer-display">0</div>
    <h1>Partystation</h1>
    
    <div id="lobby-screen" class="tv-card">
        <h2>Join at http://partystation.local:3000</h2>
        <div id="player-list-container">
            <ul id="player-list"></ul>
        </div>
    </div>

    <div id="game-area" class="tv-card" style="display: none;">
        <!-- Spectator content -->
    </div>

    <script src="tv.js"></script>
</body>
</html>
